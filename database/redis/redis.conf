# Redis Configuration for AI News Project

# Network
bind 127.0.0.1
port 6379
timeout 0

# General
daemonize no
pidfile /var/run/redis_6379.pid
loglevel notice
databases 16

# Persistence
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb

# Memory Management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Append Only File
appendonly no
appendfilename "appendonly.aof"
appendfsync everysec
